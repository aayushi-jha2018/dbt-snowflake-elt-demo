version: 2

models:
  - name: dim_customers
    description: One row per customer, enriched with lifetime order stats.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: fct_orders
    description: Incremental fact table of orders, loaded by order_date.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
